
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAP Tool — Padel FFT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--or:#E8500A;--orl:#FF6B2B;--dk:#0F0F0F;--dk2:#1A1A1A;--dk3:#242424;--bd:#2E2E2E;--tx:#F0EDE8;--tx2:#9A9590;--gr:#2ECC71;--am:#F0A500;--mo:'DM Mono',monospace;--sa:'Syne',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dk);color:var(--tx);font-family:var(--sa);min-height:100vh;}
.hdr{background:var(--dk2);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;gap:14px;}
.badge{background:var(--or);color:#fff;font-family:var(--mo);font-size:10px;padding:4px 10px;border-radius:3px;letter-spacing:.08em;}
.hdr h1{font-size:15px;font-weight:700;}
#sb{font-size:11px;color:var(--tx2);margin-left:auto;font-family:var(--mo);}
.wrap{display:grid;grid-template-columns:310px 1fr;min-height:calc(100vh - 51px);}
.side{background:var(--dk2);border-right:1px solid var(--bd);padding:18px;overflow-y:auto;}
.stl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--or);margin-bottom:9px;font-family:var(--mo);}
.fi{margin-bottom:11px;}
.fi label{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;font-family:var(--mo);}
.fi input{width:100%;background:var(--dk3);border:1px solid var(--bd);color:var(--tx);padding:8px 11px;border-radius:6px;font-family:var(--mo);font-size:12px;outline:none;transition:border-color .2s;}
.fi input:focus{border-color:var(--or);}
.div{height:1px;background:var(--bd);margin:13px 0;}
.dz{border:2px dashed var(--bd);border-radius:10px;padding:22px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:6px;}
.dz:hover,.dz.over{border-color:var(--or);background:#1f1208;}
.dz.ok{border-color:var(--gr);border-style:solid;background:#0d1f12;}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz-icon{font-size:26px;margin-bottom:5px;}
.dz-title{font-size:12px;font-weight:700;margin-bottom:3px;}
.dz-sub{font-size:10px;color:var(--tx2);font-family:var(--mo);line-height:1.4;}
.dz-ok{font-size:11px;color:var(--gr);font-family:var(--mo);margin-top:5px;display:none;}
.btn{width:100%;background:var(--or);color:#fff;border:none;padding:11px;border-radius:8px;font-family:var(--sa);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn:hover{background:var(--orl);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn2{background:var(--dk3);border:1px solid var(--bd);color:var(--tx2);margin-top:6px;font-weight:600;}
.btn2:hover{background:var(--bd);color:var(--tx);}
.main{padding:18px;overflow-y:auto;}
.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--dk2);padding:4px;border-radius:8px;width:fit-content;}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx2);border:none;background:none;font-family:var(--mo);transition:all .2s;}
.tab.on{background:var(--or);color:#fff;}
.empty{text-align:center;padding:60px 20px;color:var(--tx2);font-family:var(--mo);font-size:12px;}
.empty-i{font-size:36px;margin-bottom:12px;opacity:.3;}
.ts{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:var(--mo);}
.a{background:#1a4a2e;color:#4ade80;}.b{background:#4a3000;color:#fbbf24;}.c{background:#4a1a0a;color:#fb923c;}
.tw{overflow-x:auto;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-family:var(--mo);font-size:11px;}
th{text-align:left;padding:7px 9px;color:var(--tx2);border-bottom:1px solid var(--bd);font-size:10px;letter-spacing:.05em;}
td{padding:6px 9px;border-bottom:1px solid var(--bd);vertical-align:middle;}
tr:hover td{background:var(--dk3);}
.sl{background:var(--dk2);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;margin:2px 0;min-height:32px;display:flex;align-items:center;gap:7px;font-family:var(--mo);font-size:11px;}
.sl.bye{background:#0d1f12;border-color:var(--gr);border-left:3px solid var(--gr);}
.sl.sts{border-left:3px solid var(--or);}
.sl.emp{opacity:.15;min-height:8px;}
.sl-n{flex:1;}
.srow{background:var(--dk2);border:1px solid var(--bd);border-radius:7px;padding:8px 12px;display:grid;grid-template-columns:52px 26px 1fr auto 55px;gap:7px;align-items:center;margin-bottom:4px;}
.srow.fin{border-color:var(--or);background:#1f0f00;}
.st{font-family:var(--mo);font-size:13px;font-weight:700;color:var(--or);}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:9px;}
.mc{background:var(--dk2);border:1px solid var(--bd);border-radius:10px;padding:13px;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.mn{font-size:12px;font-weight:700;}
.mp{font-size:10px;color:var(--tx2);font-family:var(--mo);}
.mb{background:var(--dk3);border-radius:6px;padding:8px 10px;font-size:10px;line-height:1.65;font-family:var(--mo);white-space:pre-wrap;margin-bottom:7px;border-left:2px solid var(--gr);max-height:190px;overflow-y:auto;}
.ma{display:flex;gap:6px;}
.bs{flex:1;padding:6px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:none;font-family:var(--mo);text-align:center;display:block;text-decoration:none;}
.bc{background:var(--dk3);color:var(--tx);border:1px solid var(--bd);}
.bw{background:#25D366;color:#fff;}
.bd2{opacity:.3;cursor:not-allowed;background:var(--dk3);color:var(--tx2);border:1px solid var(--bd);}
.twilio-box{background:var(--dk3);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-top:8px;}
.sms-result{margin-top:10px;font-size:11px;font-family:var(--mo);padding:10px;border-radius:6px;background:var(--dk2);border:1px solid var(--bd);}
</style>
</head>
<body>
<div class="hdr">
  <div class="badge">JAP Tool</div>
  <h1>Tournoi Padel FFT — jap.myconvi.fr</h1>
  <span id="sb">En attente du CSV FFT</span>
</div>
<div class="wrap">
  <div class="side">
    <div class="stl">⚙ Tournoi</div>
    <div class="fi"><label>Nom</label><input id="nt" value="P250 Double Messieurs Sénior"/></div>
    <div class="fi"><label>Sponsor</label><input id="sp" value="CUPRA LANESTER"/></div>
    <div class="fi"><label>Date</label><input type="date" id="dt"/></div>
    <div class="fi"><label>Heure de début</label><input type="time" id="hd" value="09:00"/></div>
    <div class="fi"><label>Nb de pistes</label><input type="number" id="np" value="2" min="1" max="10"/></div>
    <div class="fi"><label>Durée match (min)</label><input type="number" id="dm" value="45" min="15"/></div>
    <div class="fi"><label>Format de jeu</label><input id="fg" value="D2 : 1 set 9 jeux, NO-AD"/></div>
    <div class="div"></div>
    <div class="stl">📂 CSV FFT</div>
    <div class="dz" id="dz">
      <input type="file" accept=".csv,.txt" id="fi-csv" onchange="loadFile(this.files[0])"/>
      <div class="dz-icon">📋</div>
      <div class="dz-title">Glisser Inscriptions-Tableau.csv</div>
      <div class="dz-sub">Export direct depuis le site FFT</div>
      <div class="dz-ok" id="dz-ok"></div>
    </div>
    <div class="div"></div>
    <button class="btn" id="bg" onclick="generer()" disabled>⚡ Générer le tableau</button>
    <button class="btn btn2" id="b-tab" onclick="dlPdf('tableau')" disabled>📄 Tableau officiel FFT (PDF)</button>
    <button class="btn btn2" id="b-fdr" onclick="dlPdf('feuille')" disabled>🖨 Feuille de route (PDF)</button>
    <div class="twilio-box" id="twilio-box" style="display:none">
      <div class="stl">📱 Envoi SMS Twilio</div>
      <div class="fi"><label>Account SID</label><input id="tw-sid" placeholder="ACxxxxxxxx" type="password"/></div>
      <div class="fi"><label>Auth Token</label><input id="tw-tok" placeholder="xxxxxxxx" type="password"/></div>
      <div class="fi"><label>Numéro Twilio</label><input id="tw-num" placeholder="+33xxxxxxxxx"/></div>
      <button class="btn" onclick="envoyerSMS()">📤 Envoyer tous les SMS</button>
      <div class="sms-result" id="sms-result" style="display:none"></div>
    </div>
    <button class="btn btn2" onclick="raz()">↺ Réinitialiser</button>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab on" onclick="st('tt')">Tableau</button>
      <button class="tab" onclick="st('th')">Horaires</button>
      <button class="tab" onclick="st('tm')">WhatsApp</button>
    </div>
    <div id="tt"><div class="empty"><div class="empty-i">🎾</div>Glisse le CSV FFT et clique Générer</div></div>
    <div id="th" style="display:none"><div class="empty"><div class="empty-i">🕐</div>Les horaires apparaîtront ici</div></div>
    <div id="tm" style="display:none"><div class="empty"><div class="empty-i">💬</div>Les messages apparaîtront ici</div></div>
  </div>
</div>
<script>
let csvText='', genData=null;

function st(n){
  ['tt','th','tm'].forEach(t=>document.getElementById(t).style.display=t===n?'block':'none');
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['tt','th','tm'][i]===n));
}

function loadFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    csvText=e.target.result.replace(/^\uFEFF/,'');
    document.getElementById('dz-ok').textContent='✓ Fichier chargé — prêt à générer';
    document.getElementById('dz-ok').style.display='block';
    document.getElementById('dz').classList.add('ok');
    document.getElementById('bg').disabled=false;
    document.getElementById('sb').textContent='CSV chargé';
  };
  r.readAsText(file,'utf-8');
}

const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f){document.getElementById('fi-csv').files=e.dataTransfer.files;loadFile(f);}});

async function generer(){
  if(!csvText){alert('Charge le CSV d\'abord !');return;}
  const btn=document.getElementById('bg');
  btn.disabled=true; btn.textContent='⏳ Génération...';
  try {
    const r=await fetch('/generer',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        csv:csvText,
        nomTournoi:document.getElementById('nt').value,
        sponsor:document.getElementById('sp').value,
        dateStr:(()=>{const d=document.getElementById('dt').value;return d?new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';})(),
        heureDebut:document.getElementById('hd').value,
        nbPistes:parseInt(document.getElementById('np').value),
        dureeMatch:parseInt(document.getElementById('dm').value),
        formatJeu:document.getElementById('fg').value,
      })
    });
    const data=await r.json();
    if(data.error){alert(data.error);return;}
    genData=data;
    renTab(data); renH(data); renMsg(data);
    document.getElementById('b-tab').disabled=false;
    document.getElementById('b-fdr').disabled=false;
    document.getElementById('twilio-box').style.display='block';
    document.getElementById('sb').textContent=data.paires.length+' paires · TMC 20 matchs · '+new Date().toLocaleTimeString('fr-FR');
    if(data.doublons?.length) alert('⚠️ Doublons de licence : '+data.doublons.join(', '));
  } catch(e){ alert('Erreur : '+e.message); }
  finally { btn.disabled=false; btn.textContent='⚡ Générer le tableau'; }
}

async function dlPdf(type){
  if(!genData)return;
  const btn=document.getElementById(type==='tableau'?'b-tab':'b-fdr');
  const orig=btn.textContent; btn.disabled=true; btn.textContent='⏳ PDF en cours...';
  try {
    const payload=type==='tableau'
      ? {tableau:genData.tableau,qfMap:genData.qfMap,nomTournoi:document.getElementById('nt').value,dateStr:(()=>{const d=document.getElementById('dt').value;return d?new Date(d+'T12:00:00').toLocaleDateString('fr-FR'):'';})(),formatJeu:document.getElementById('fg').value}
      : {matchs:genData.matchs,nomTournoi:document.getElementById('nt').value,dateStr:(()=>{const d=document.getElementById('dt').value;return d?new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';})(),sponsor:document.getElementById('sp').value,formatJeu:document.getElementById('fg').value};
    const r=await fetch(`/pdf/${type}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error('Erreur '+r.status);
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=type==='tableau'?'tableau_p250.pdf':'feuille_route.pdf'; a.click();
    URL.revokeObjectURL(url);
  } catch(e){ alert('Erreur PDF : '+e.message); }
  finally { btn.disabled=false; btn.textContent=orig; }
}

async function envoyerSMS(){
  if(!genData?.messages)return;
  const sid=document.getElementById('tw-sid').value;
  const tok=document.getElementById('tw-tok').value;
  const num=document.getElementById('tw-num').value;
  if(!sid||!tok||!num){alert('Remplis les 3 champs Twilio !');return;}
  const btn=event.target; btn.disabled=true; btn.textContent='📤 Envoi en cours...';
  try {
    const r=await fetch('/sms/envoyer',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:genData.messages,twilioSid:sid,twilioToken:tok,twilioFrom:num})});
    const data=await r.json();
    const el=document.getElementById('sms-result');
    el.style.display='block';
    if(data.error){ el.innerHTML=`<span style="color:var(--am)">❌ ${data.error}</span>`; return; }
    el.innerHTML=`<span style="color:var(--gr)">✅ ${data.sent}/${data.total} SMS envoyés</span><br>`
      +data.results.map(r=>`<span style="color:${r.status==='sent'?'var(--gr)':r.status==='skipped'?'var(--am)':'var(--or)'}">${r.status==='sent'?'✓':'✗'} ${r.tel}</span>`).join('<br>');
  } catch(e){ alert('Erreur SMS : '+e.message); }
  finally { btn.disabled=false; btn.textContent='📤 Envoyer tous les SMS'; }
}

function renTab(d){
  const tc=ts=>ts?(parseInt(ts.replace('TS',''))<=2?'a':parseInt(ts.replace('TS',''))<=4?'b':'c'):'';
  let h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">';
  h+='<div><div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);font-family:var(--mo);margin-bottom:7px;">Moitié haute — TS2</div>';
  for(let i=0;i<8;i++) h+=slH(d.tableau[i]);
  h+='</div><div><div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);font-family:var(--mo);margin-bottom:7px;">Moitié basse — TS1</div>';
  for(let i=8;i<16;i++) h+=slH(d.tableau[i]);
  h+='</div></div>';
  h+='<div style="height:1px;background:var(--bd);margin:14px 0;"></div>';
  h+='<div class="stl">Classement des paires</div>';
  h+='<div class="tw"><table><tr><th>#</th><th>Paire</th><th>Licence J1</th><th>Licence J2</th><th>Poids</th><th>TS</th><th>Statut</th></tr>';
  d.paires.forEach((p,i)=>{
    const c=i<2?'a':i<4?'b':'c';
    const ts=p.ts?`<span class="ts ${c}">${p.ts}</span>`:'—';
    const st=i<4?`<span style="color:var(--gr);font-size:10px;">BYE → QF</span>`:`<span style="color:var(--tx2);font-size:10px;">1/8</span>`;
    h+=`<tr><td style="font-family:var(--mo);color:var(--tx2);">${i+1}</td><td style="font-weight:600;">${p.prenJ1} ${p.nomJ1} / ${p.prenJ2} ${p.nomJ2}</td><td style="font-family:var(--mo);font-size:10px;color:var(--tx2);">${p.licJ1}</td><td style="font-family:var(--mo);font-size:10px;color:var(--tx2);">${p.licJ2}</td><td style="font-family:var(--mo);color:var(--or);">${p.poids}</td><td>${ts}</td><td>${st}</td></tr>`;
  });
  h+='</table></div>';
  document.getElementById('tt').innerHTML=h;
}

function slH(s){
  const[t,p]=s;
  if(t==='emp') return'<div class="sl emp"></div>';
  const isBye=t==='bye';
  const tc={TS1:'a',TS2:'a',TS3:'b',TS4:'b',TS5:'c',TS6:'c',TS7:'c',TS8:'c'};
  const cls=isBye?'sl bye':(p?.ts?'sl sts':'sl');
  const badge=p?.ts?`<span class="ts ${tc[p.ts]||'c'}">${p.ts}</span>`:'';
  const extra=isBye?`<span style="font-size:9px;color:var(--gr);">BYE→QF</span>`:'';
  return`<div class="${cls}">${badge}<span class="sl-n">${p?.prenJ1||''} ${p?.nomJ1||''} / ${p?.prenJ2||''} ${p?.nomJ2||''}</span><span style="font-size:9px;color:var(--tx2);">${p?.poids||''}</span>${extra}</div>`;
}

function renH(d){
  const secs={1:'1/8 de finale',5:'Classement 9-12',7:'Quarts de finale',11:'Classement (suite)',13:'Classement 5-8',15:'Demi-finales',17:'Classements finaux',20:'Finale'};
  let h=`<div class="stl" style="margin-bottom:11px;">Planning TMC · ${document.getElementById('np').value} piste(s) · ${document.getElementById('dm').value} min/match</div>`;
  d.matchs.forEach(m=>{
    if(secs[m.num])h+=`<div style="font-size:10px;font-weight:700;color:var(--tx2);font-family:var(--mo);padding:7px 0 3px;text-transform:uppercase;letter-spacing:.08em;">${secs[m.num]}</div>`;
    const as=m.pA?`${m.pA.prenJ1} ${m.pA.nomJ1} / ${m.pA.prenJ2} ${m.pA.nomJ2}`:(m.libA||'?');
    const bs=m.pB?`${m.pB.prenJ1} ${m.pB.nomJ1} / ${m.pB.prenJ2} ${m.pB.nomJ2}`:(m.libB||'?');
    const cls=m.num===20?'srow fin':'srow';
    h+=`<div class="${cls}"><div class="st">${m.heure||'?'}</div><div style="font-family:var(--mo);font-size:11px;color:var(--tx2);font-weight:700;">M${m.num}</div><div style="font-size:11px;"><strong>${as}</strong><span style="color:var(--or);font-size:10px;margin:0 4px;">VS</span><strong>${bs}</strong></div><div style="font-size:10px;color:var(--tx2);font-family:var(--mo);">${m.ordre}</div><div style="font-size:10px;color:var(--tx2);font-family:var(--mo);text-align:right;">T.${m.piste||'?'}</div></div>`;
  });
  document.getElementById('th').innerHTML=h;
}

function renMsg(d){
  let h=`<div class="stl" style="margin-bottom:11px;">Messages convocation — ${d.messages.length} joueurs</div><div class="mg">`;
  d.messages.forEach(m=>{
    const tsc=m.ts?(parseInt(m.ts.replace('TS',''))<=2?'a':parseInt(m.ts.replace('TS',''))<=4?'b':'c'):'';
    const telC=m.telClean;
    const wa=telC?`<a class="bs bw" href="https://wa.me/${telC}?text=${encodeURIComponent(m.msg)}" target="_blank">💬 WhatsApp</a>`:`<span class="bs bd2">Pas de N°</span>`;
    h+=`<div class="mc"><div class="mh"><div><div class="mn">${m.prenom} ${m.nom.toUpperCase()}${m.ts?' — '+m.ts:''}</div><div class="mp">${m.tel||'N° non renseigné'}</div></div>${m.ts?`<span class="ts ${tsc}">${m.ts}</span>`:''}</div><div class="mb">${m.msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="ma"><button class="bs bc" onclick="navigator.clipboard.writeText(${JSON.stringify(m.msg)}).then(()=>{this.textContent='✅';setTimeout(()=>this.textContent='📋 Copier',2000)})">📋 Copier</button>${wa}</div></div>`;
  });
  h+='</div>';
  document.getElementById('tm').innerHTML=h;
}

function raz(){
  csvText=''; genData=null;
  document.getElementById('dz-ok').style.display='none';
  document.getElementById('dz').classList.remove('ok');
  document.getElementById('bg').disabled=true;
  document.getElementById('b-tab').disabled=true;
  document.getElementById('b-fdr').disabled=true;
  document.getElementById('twilio-box').style.display='none';
  document.getElementById('fi-csv').value='';
  ['tt','th','tm'].forEach(t=>document.getElementById(t).innerHTML=`<div class="empty"><div class="empty-i">🎾</div>En attente</div>`);
  document.getElementById('sb').textContent='En attente du CSV FFT';
}

document.getElementById('dt').value=new Date().toISOString().split('T')[0];
</script>
</body>
</html>
